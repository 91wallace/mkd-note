<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Bloco de Notas Markdown</title>
  
  <!-- Parser e Sanitizador de Markdown -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --font-size: 18px;
    }

    body {
      background-color: #000000;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      touch-action: none;
      position: relative;
    }

    /* Botão Flutuante Discreto */
    #toggle-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 100;
      background-color: #1a1a1a;
      color: #888888;
      border: 1px solid #333333;
      padding: 4px 10px;
      font-size: 12px;
      border-radius: 4px;
      cursor: pointer;
      user-select: none;
      transition: all 0.2s ease;
      font-family: monospace;
    }

    #toggle-btn.active {
      background-color: #0066cc;
      color: #ffffff;
      border-color: #0055b3;
    }

    /* Área Principal de Edição */
    #editor-container {
      width: 100%;
      height: 100%;
      padding: 40px 20px 20px 20px;
      font-size: var(--font-size);
      line-height: 1.6;
      overflow-y: auto;
      touch-action: pan-y;
      outline: none;
    }

    /* Estilo do modo Markdown Renderizado (WYSIWYG) */
    .rendered-mode {
      color: #e4e4e7;
      background-color: #000000;
    }

    .rendered-mode h1, .rendered-mode h2, .rendered-mode h3 { 
      margin-bottom: 0.5em; 
      margin-top: 1em; 
      color: #fff; 
    }
    .rendered-mode h1 { font-size: 2em; border-bottom: 1px solid #27272a; padding-bottom: 0.3em; }
    .rendered-mode h2 { font-size: 1.5em; }
    .rendered-mode p { margin-bottom: 1em; }
    .rendered-mode code { background: #1f1f23; padding: 2px 6px; border-radius: 4px; font-family: monospace; }
    .rendered-mode pre { background: #1f1f23; padding: 12px; border-radius: 6px; overflow-x: auto; margin-bottom: 1em; }
    .rendered-mode pre code { background: none; padding: 0; }
    .rendered-mode ul, .rendered-mode ol { margin-left: 20px; margin-bottom: 1em; }
    .rendered-mode blockquote { border-left: 4px solid #3f3f46; padding-left: 12px; color: #a1a1aa; margin-bottom: 1em; }

    /* Estilo do modo Texto Cru (Raw) */
    .raw-mode {
      font-family: "Fira Code", monospace, monospace;
      white-space: pre-wrap;
      word-wrap: break-word;
      color: #a1a1aa;
      background-color: #000000;
    }
  </style>
</head>
<body>

  <button id="toggle-btn">markdown</button>
  <div id="editor-container" contenteditable="true" class="rendered-mode" spellcheck="false"></div>

  <script>
    const editor = document.getElementById('editor-container');
    const toggleBtn = document.getElementById('toggle-btn');

    let markdownRaw = localStorage.getItem('notepad_md_content') || "# Bloco de Notas\n\nEscreva diretamente aqui em **Markdown**.\n\n- O texto é renderizado na tela inteira.\n- Clique no botão `markdown` no canto superior direito para ver o código fonte bruto.\n- Afaste ou aproxime os dois dedos para ajustar o zoom da fonte.";
    
    let isRawMode = false;
    let currentFontSize = parseFloat(localStorage.getItem('notepad_font_size')) || 18;

    updateFontSize(currentFontSize);

    // Renderiza inicialmente
    renderFormatted();

    // 1. Alternância de Modo (Raw / Renderizado)
    toggleBtn.addEventListener('click', () => {
      isRawMode = !isRawMode;

      if (isRawMode) {
        // Salva estado atual antes de mudar
        saveCurrentContent();
        
        // Exibe texto cru
        editor.innerText = markdownRaw;
        editor.className = 'raw-mode';
        toggleBtn.classList.add('active');
      } else {
        // Captura o texto do modo cru
        markdownRaw = editor.innerText;
        saveToLocalStorage();

        // Renderiza HTML formatado
        renderFormatted();
        editor.className = 'rendered-mode';
        toggleBtn.classList.remove('active');
      }
    });

    // 2. Evento de Digitação e Salvamento
    editor.addEventListener('input', () => {
      saveCurrentContent();
    });

    function saveCurrentContent() {
      if (isRawMode) {
        markdownRaw = editor.innerText;
      } else {
        // No modo renderizado, extraímos o texto mantendo quebras de linha
        markdownRaw = getMarkdownFromDOM(editor);
      }
      saveToLocalStorage();
    }

    function renderFormatted() {
      editor.innerHTML = marked.parse(markdownRaw);
    }

    function saveToLocalStorage() {
      localStorage.setItem('notepad_md_content', markdownRaw);
    }

    // Extrai texto mantendo a estrutura quando editado no modo formatado
    function getMarkdownFromDOM(element) {
      // Para manter a consistência simples sem seletores complexos de WYSIWYG
      return element.innerText;
    }

    // 3. Controle de Zoom (Pinch-to-Zoom e Ctrl+Scroll)
    function updateFontSize(size) {
      currentFontSize = Math.min(Math.max(size, 10), 60);
      document.documentElement.style.setProperty('--font-size', `${currentFontSize}px`);
      localStorage.setItem('notepad_font_size', currentFontSize);
    }

    let initialDistance = null;
    let initialFontSize = 18;

    document.addEventListener('touchstart', (e) => {
      if (e.touches.length === 2) {
        initialDistance = getDistance(e.touches);
        initialFontSize = currentFontSize;
      }
    }, { passive: true });

    document.addEventListener('touchmove', (e) => {
      if (e.touches.length === 2 && initialDistance !== null) {
        const newDistance = getDistance(e.touches);
        const scale = newDistance / initialDistance;
        updateFontSize(initialFontSize * scale);
      }
    }, { passive: true });

    document.addEventListener('touchend', (e) => {
      if (e.touches.length < 2) {
        initialDistance = null;
      }
    }, { passive: true });

    function getDistance(touches) {
      const dx = touches[0].clientX - touches[1].clientX;
      const dy = touches[0].clientY - touches[1].clientY;
      return Math.hypot(dx, dy);
    }

    document.addEventListener('wheel', (e) => {
      if (e.ctrlKey) {
        e.preventDefault();
        const delta = e.deltaY < 0 ? 1.1 : 0.9;
        updateFontSize(currentFontSize * delta);
      }
    }, { passive: false });
  </script>
</body>
</html>
