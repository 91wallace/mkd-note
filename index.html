<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Bloco de Notas Markdown</title>
  
  <!-- Parser de Markdown -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --font-size: 18px;
    }

    body {
      background-color: #000000;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      touch-action: none;
      position: relative;
    }

    /* Botão Flutuante Discreto */
    #toggle-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 100;
      background-color: #1a1a1a;
      color: #888888;
      border: 1px solid #333333;
      padding: 4px 10px;
      font-size: 12px;
      border-radius: 4px;
      cursor: pointer;
      user-select: none;
      transition: all 0.2s ease;
      font-family: monospace;
    }

    #toggle-btn.active {
      background-color: #0066cc;
      color: #ffffff;
      border-color: #0055b3;
    }

    /* Container dos Elementos */
    .editor-wrapper {
      position: relative;
      width: 100%;
      height: 100%;
    }

    /* Estilo base compartilhado entre Editor e Preview */
    #editor, #preview {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      padding: 40px 20px 20px 20px;
      font-size: var(--font-size);
      line-height: 1.6;
      overflow-y: auto;
      touch-action: pan-y;
      border: none;
      outline: none;
    }

    /* Textarea de Digitação */
    #editor {
      z-index: 2;
      background: transparent;
      color: transparent;
      caret-color: #ffffff; /* Cor do cursor de digitação */
      resize: none;
      font-family: inherit;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    /* Modo Texto Cru (Raw) */
    #editor.raw-mode {
      color: #a1a1aa;
      background-color: #000000;
      font-family: "Fira Code", monospace, monospace;
      z-index: 3;
    }

    /* Preview Formatado */
    #preview {
      z-index: 1;
      background-color: #000000;
      color: #e4e4e7;
      pointer-events: none; /* Deixa os cliques passarem para o textarea */
    }

    /* Estilização da Renderização Markdown */
    #preview h1, #preview h2, #preview h3 { 
      margin-bottom: 0.5em; 
      margin-top: 0.8em; 
      color: #fff; 
    }
    #preview h1 { font-size: 2em; border-bottom: 1px solid #27272a; padding-bottom: 0.3em; }
    #preview h2 { font-size: 1.5em; }
    #preview p { margin-bottom: 1em; }
    #preview code { background: #1f1f23; padding: 2px 6px; border-radius: 4px; font-family: monospace; }
    #preview pre { background: #1f1f23; padding: 12px; border-radius: 6px; overflow-x: auto; margin-bottom: 1em; }
    #preview pre code { background: none; padding: 0; }
    #preview ul, #preview ol { margin-left: 20px; margin-bottom: 1em; }
    #preview blockquote { border-left: 4px solid #3f3f46; padding-left: 12px; color: #a1a1aa; margin-bottom: 1em; }
  </style>
</head>
<body>

  <button id="toggle-btn">markdown</button>
  
  <div class="editor-wrapper">
    <textarea id="editor" spellcheck="false"></textarea>
    <div id="preview"></div>
  </div>

  <script>
    const editor = document.getElementById('editor');
    const preview = document.getElementById('preview');
    const toggleBtn = document.getElementById('toggle-btn');

    let markdownRaw = localStorage.getItem('notepad_md_content') || "# Bloco de Notas\n\nEscreva diretamente aqui em **Markdown**.\n\n- O texto é renderizado na tela inteira.\n- Clique no botão `markdown` no canto superior direito para ver o código fonte bruto.\n- Afaste ou aproxime os dois dedos para ajustar o zoom da fonte.";
    
    let isRawMode = false;
    let currentFontSize = parseFloat(localStorage.getItem('notepad_font_size')) || 18;

    // Inicialização
    editor.value = markdownRaw;
    updateFontSize(currentFontSize);
    renderFormatted();
    updateDocumentTitle();

    // Sincronizar rolagem de tela entre Editor e Preview
    editor.addEventListener('scroll', () => {
      preview.scrollTop = editor.scrollTop;
    });

    // Evento de Digitação e Salvamento
    editor.addEventListener('input', () => {
      markdownRaw = editor.value;
      saveToLocalStorage();
      renderFormatted();
      updateDocumentTitle();
    });

    // Alternância de Modo (Raw / Renderizado)
    toggleBtn.addEventListener('click', () => {
      isRawMode = !isRawMode;

      if (isRawMode) {
        editor.classList.add('raw-mode');
        toggleBtn.classList.add('active');
      } else {
        editor.classList.remove('raw-mode');
        toggleBtn.classList.remove('active');
        renderFormatted();
      }
    });

    function renderFormatted() {
      preview.innerHTML = marked.parse(editor.value);
    }

    function saveToLocalStorage() {
      localStorage.setItem('notepad_md_content', markdownRaw);
    }

    function updateDocumentTitle() {
      const match = markdownRaw.match(/^#+\s+(.*)/m);
      if (match && match[1]) {
        document.title = match[1].trim();
      } else {
        const firstLine = markdownRaw.trim().split('\n')[0] || '';
        document.title = firstLine.substring(0, 30) || 'Bloco de Notas Markdown';
      }
    }

    // Controle de Zoom (Pinch-to-Zoom e Ctrl+Scroll)
    function updateFontSize(size) {
      currentFontSize = Math.min(Math.max(size, 10), 60);
      document.documentElement.style.setProperty('--font-size', `${currentFontSize}px`);
      localStorage.setItem('notepad_font_size', currentFontSize);
    }

    let initialDistance = null;
    let initialFontSize = 18;

    document.addEventListener('touchstart', (e) => {
      if (e.touches.length === 2) {
        initialDistance = getDistance(e.touches);
        initialFontSize = currentFontSize;
      }
    }, { passive: true });

    document.addEventListener('touchmove', (e) => {
      if (e.touches.length === 2 && initialDistance !== null) {
        const newDistance = getDistance(e.touches);
        const scale = newDistance / initialDistance;
        updateFontSize(initialFontSize * scale);
      }
    }, { passive: true });

    document.addEventListener('touchend', (e) => {
      if (e.touches.length < 2) {
        initialDistance = null;
      }
    }, { passive: true });

    function getDistance(touches) {
      const dx = touches[0].clientX - touches[1].clientX;
      const dy = touches[0].clientY - touches[1].clientY;
      return Math.hypot(dx, dy);
    }

    document.addEventListener('wheel', (e) => {
      if (e.ctrlKey) {
        e.preventDefault();
        const delta = e.deltaY < 0 ? 1.1 : 0.9;
        updateFontSize(currentFontSize * delta);
      }
    }, { passive: false });
  </script>
</body>
</html>
