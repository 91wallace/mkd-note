<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Bloco de Notas Markdown</title>
  
  <!-- Parser de Markdown -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --font-size: 18px;
      --line-height: 1.6;
    }

    body {
      background-color: #000000;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      touch-action: none;
      position: relative;
    }

    /* Controles Superiores */
    #menu-btn {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 100;
      background-color: #1a1a1a;
      color: #ffffff;
      border: 1px solid #333333;
      padding: 4px 10px;
      font-size: 14px;
      border-radius: 4px;
      cursor: pointer;
      user-select: none;
      transition: all 0.2s ease;
    }

    #toggle-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 100;
      background-color: #1a1a1a;
      color: #888888;
      border: 1px solid #333333;
      padding: 4px 10px;
      font-size: 12px;
      border-radius: 4px;
      cursor: pointer;
      user-select: none;
      transition: all 0.2s ease;
      font-family: inherit;
    }

    #toggle-btn.active {
      background-color: #0066cc;
      color: #ffffff;
      border-color: #0055b3;
    }

    /* Sidebar / Aba Lateral */
    #sidebar {
      position: absolute;
      top: 0;
      left: -280px;
      width: 280px;
      height: 100%;
      background-color: #121212;
      border-right: 1px solid #27272a;
      z-index: 200;
      transition: left 0.3s ease;
      display: flex;
      flex-direction: column;
      padding: 16px;
    }

    #sidebar.open {
      left: 0;
    }

    #overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0, 0, 0, 0.6);
      z-index: 150;
      display: none;
    }

    #overlay.active {
      display: block;
    }

    .sidebar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 1px solid #27272a;
    }

    .sidebar-title {
      font-size: 16px;
      font-weight: bold;
      color: #ffffff;
    }

    #new-note-btn {
      background-color: #0066cc;
      color: #ffffff;
      border: none;
      padding: 8px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 16px;
      width: 100%;
      text-align: center;
    }

    .notes-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .note-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 12px;
      background-color: #1a1a1a;
      border: 1px solid #27272a;
      border-radius: 4px;
      cursor: pointer;
      color: #a1a1aa;
      font-size: 14px;
      transition: all 0.2s;
    }

    .note-item:hover, .note-item.active {
      background-color: #27272a;
      color: #ffffff;
      border-color: #3f3f46;
    }

    .note-item-title {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      margin-right: 8px;
    }

    .delete-note-btn {
      background: none;
      border: none;
      color: #71717a;
      cursor: pointer;
      font-size: 14px;
      padding: 2px 6px;
    }

    .delete-note-btn:hover {
      color: #ef4444;
    }

    /* Container de Conteúdo Unificado */
    .editor-container {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #rendered-editor, #raw-editor {
      width: 100%;
      height: 100%;
      padding: 55px 20px 20px 20px;
      font-size: var(--font-size);
      line-height: var(--line-height);
      overflow-y: auto;
      touch-action: pan-y;
      border: none;
      outline: none;
      position: absolute;
      top: 0;
      left: 0;
    }

    /* Editor Renderizado (WYSIWYG) */
    #rendered-editor {
      background-color: #000000;
      color: #e4e4e7;
      z-index: 2;
    }

    #rendered-editor h1, #rendered-editor h2, #rendered-editor h3 { 
      margin-top: 0.8em;
      margin-bottom: 0.4em; 
      color: #fff; 
    }
    #rendered-editor h1 { font-size: 2em; border-bottom: 1px solid #27272a; padding-bottom: 0.3em; }
    #rendered-editor h2 { font-size: 1.5em; }
    #rendered-editor p { margin-bottom: 1em; }
    #rendered-editor code { background: #1f1f23; padding: 2px 6px; border-radius: 4px; font-family: monospace; }
    #rendered-editor pre { background: #1f1f23; padding: 12px; border-radius: 6px; overflow-x: auto; margin-bottom: 1em; }
    #rendered-editor pre code { background: none; padding: 0; }
    #rendered-editor ul, #rendered-editor ol { margin-left: 20px; margin-bottom: 1em; }
    #rendered-editor blockquote { border-left: 4px solid #3f3f46; padding-left: 12px; color: #a1a1aa; margin-bottom: 1em; }

    /* Editor de Código Bruto (Textarea) */
    #raw-editor {
      background-color: #000000;
      color: #a1a1aa;
      font-family: "Fira Code", monospace, monospace;
      resize: none;
      white-space: pre-wrap;
      word-wrap: break-word;
      z-index: 1;
      display: none;
    }

    #raw-editor.active {
      display: block;
      z-index: 3;
    }
  </style>
</head>
<body>

  <!-- Botões Principais -->
  <button id="menu-btn">☰</button>
  <button id="toggle-btn">Editar</button>

  <!-- Overlay para fechar sidebar clicando fora -->
  <div id="overlay"></div>

  <!-- Sidebar Lateral -->
  <div id="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">Minhas Notas</span>
    </div>
    <button id="new-note-btn">+ Nova Nota</button>
    <div class="notes-list" id="notes-list"></div>
  </div>

  <!-- Área de Edição -->
  <div class="editor-container">
    <div id="rendered-editor" contenteditable="true" spellcheck="false"></div>
    <textarea id="raw-editor" spellcheck="false"></textarea>
  </div>

  <script>
    const renderedEditor = document.getElementById('rendered-editor');
    const rawEditor = document.getElementById('raw-editor');
    const toggleBtn = document.getElementById('toggle-btn');
    const menuBtn = document.getElementById('menu-btn');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');
    const newNoteBtn = document.getElementById('new-note-btn');
    const notesListContainer = document.getElementById('notes-list');

    // Estado da Aplicação
    let notes = JSON.parse(localStorage.getItem('notepad_notes_list')) || [];
    let currentNoteId = localStorage.getItem('notepad_current_note_id');
    let isRawMode = false;
    let currentFontSize = parseFloat(localStorage.getItem('notepad_font_size')) || 18;

    // Inicialização
    if (notes.length === 0) {
      const initialNote = {
        id: Date.now().toString(),
        content: "# Primeira Nota\n\nEscreva diretamente aqui em **Markdown**.\n\n- Acesse a barra lateral no ícone `☰` para criar novas notas.\n- Alterne para edição bruta pelo botão `Editar`."
      };
      notes.push(initialNote);
      currentNoteId = initialNote.id;
    } else if (!currentNoteId || !notes.find(n => n.id === currentNoteId)) {
      currentNoteId = notes[0].id;
    }

    saveNotesToStorage();
    loadCurrentNote();
    updateFontSize(currentFontSize);

    // Sidebar
    menuBtn.addEventListener('click', () => {
      sidebar.classList.toggle('open');
      overlay.classList.toggle('active');
    });

    overlay.addEventListener('click', closeSidebar);

    function closeSidebar() {
      sidebar.classList.remove('open');
      overlay.classList.remove('active');
    }

    // Carregar Nota Ativa
    function loadCurrentNote() {
      const note = notes.find(n => n.id === currentNoteId);
      if (note) {
        if (isRawMode) {
          rawEditor.value = note.content;
        } else {
          renderedEditor.innerHTML = marked.parse(note.content);
        }
        updateDocumentTitle(note.content);
        renderNotesList();
      }
    }

    function saveNotesToStorage() {
      localStorage.setItem('notepad_notes_list', JSON.stringify(notes));
      localStorage.setItem('notepad_current_note_id', currentNoteId);
    }

    function getNoteTitle(content) {
      const match = content.match(/^#+\s+(.*)/m);
      if (match && match[1]) {
        return match[1].trim();
      }
      const firstLine = content.trim().split('\n')[0] || '';
      return firstLine.substring(0, 24) || 'Nota sem título';
    }

    function renderNotesList() {
      notesListContainer.innerHTML = '';
      notes.forEach(note => {
        const item = document.createElement('div');
        item.className = `note-item ${note.id === currentNoteId ? 'active' : ''}`;
        
        const titleSpan = document.createElement('span');
        titleSpan.className = 'note-item-title';
        titleSpan.textContent = getNoteTitle(note.content);

        const deleteBtn = document.createElement('button');
        deleteBtn.className = 'delete-note-btn';
        deleteBtn.innerHTML = '✕';
        deleteBtn.onclick = (e) => {
          e.stopPropagation();
          deleteNote(note.id);
        };

        item.appendChild(titleSpan);
        if (notes.length > 1) {
          item.appendChild(deleteBtn);
        }

        item.onclick = () => {
          currentNoteId = note.id;
          saveNotesToStorage();
          loadCurrentNote();
          closeSidebar();
        };

        notesListContainer.appendChild(item);
      });
    }

    newNoteBtn.addEventListener('click', () => {
      const newNote = {
        id: Date.now().toString(),
        content: '# Nova Nota\n\nComece a digitar...'
      };
      notes.unshift(newNote);
      currentNoteId = newNote.id;
      saveNotesToStorage();
      loadCurrentNote();
      closeSidebar();
    });

    function deleteNote(id) {
      if (notes.length <= 1) return;
      notes = notes.filter(n => n.id !== id);
      if (currentNoteId === id) {
        currentNoteId = notes[0].id;
      }
      saveNotesToStorage();
      loadCurrentNote();
    }

    function getCleanTextFromContentEditable(element) {
      let text = element.innerText || '';
      text = text.replace(/\u00A0/g, ' ').replace(/\r\n/g, '\n');
      return text;
    }

    // Edição e Salvamento Tratado
    renderedEditor.addEventListener('input', () => {
      if (!isRawMode) {
        const note = notes.find(n => n.id === currentNoteId);
        if (note) {
          note.content = getCleanTextFromContentEditable(renderedEditor);
          saveNotesToStorage();
          updateDocumentTitle(note.content);
          renderNotesList();
        }
      }
    });

    rawEditor.addEventListener('input', () => {
      if (isRawMode) {
        const note = notes.find(n => n.id === currentNoteId);
        if (note) {
          note.content = rawEditor.value;
          saveNotesToStorage();
          updateDocumentTitle(note.content);
          renderNotesList();
        }
      }
    });

    // Alternância de Modo (Editar / Salvar)
    toggleBtn.addEventListener('click', () => {
      isRawMode = !isRawMode;
      const note = notes.find(n => n.id === currentNoteId);

      if (isRawMode) {
        if (note) rawEditor.value = note.content;
        rawEditor.classList.add('active');
        toggleBtn.classList.add('active');
        toggleBtn.textContent = 'Salvar';
      } else {
        if (note) renderedEditor.innerHTML = marked.parse(note.content);
        rawEditor.classList.remove('active');
        toggleBtn.classList.remove('active');
        toggleBtn.textContent = 'Editar';
      }
    });

    function updateDocumentTitle(content) {
      document.title = getNoteTitle(content);
    }

    // Zoom (Pinch-to-Zoom e Ctrl+Scroll)
    function updateFontSize(size) {
      currentFontSize = Math.min(Math.max(size, 10), 60);
      document.documentElement.style.setProperty('--font-size', `${currentFontSize}px`);
      localStorage.setItem('notepad_font_size', currentFontSize);
    }

    let initialDistance = null;
    let initialFontSize = 18;

    document.addEventListener('touchstart', (e) => {
      if (e.touches.length === 2) {
        initialDistance = getDistance(e.touches);
        initialFontSize = currentFontSize;
      }
    }, { passive: true });

    document.addEventListener('touchmove', (e) => {
      if (e.touches.length === 2 && initialDistance !== null) {
        const newDistance = getDistance(e.touches);
        const scale = newDistance / initialDistance;
        updateFontSize(initialFontSize * scale);
      }
    }, { passive: true });

    document.addEventListener('touchend', (e) => {
      if (e.touches.length < 2) initialDistance = null;
    }, { passive: true });

    function getDistance(touches) {
      const dx = touches[0].clientX - touches[1].clientX;
      const dy = touches[0].clientY - touches[1].clientY;
      return Math.hypot(dx, dy);
    }

    document.addEventListener('wheel', (e) => {
      if (e.ctrlKey) {
        e.preventDefault();
        const delta = e.deltaY < 0 ? 1.1 : 0.9;
        updateFontSize(currentFontSize * delta);
      }
    }, { passive: false });
  </script>
</body>
</html>
