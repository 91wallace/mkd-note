<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Bloco de Notas Markdown</title>
  
  <!-- Parser de Markdown -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --font-size: 18px;
      --line-height: 1.6;
    }

    body {
      background-color: #000000;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      touch-action: none;
      position: relative;
    }

    /* Controles Superiores */
    #menu-btn {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 100;
      background-color: #1a1a1a;
      color: #ffffff;
      border: 1px solid #333333;
      padding: 4px 10px;
      font-size: 14px;
      border-radius: 4px;
      cursor: pointer;
      user-select: none;
    }

    .top-actions {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 100;
      display: flex;
      gap: 8px;
    }

    .action-btn {
      background-color: #1a1a1a;
      color: #888888;
      border: 1px solid #333333;
      padding: 4px 10px;
      font-size: 12px;
      border-radius: 4px;
      cursor: pointer;
      user-select: none;
      transition: all 0.2s ease;
      font-family: inherit;
    }

    .action-btn.active {
      background-color: #0066cc;
      color: #ffffff;
      border-color: #0055b3;
    }

    .action-btn.primary {
      background-color: #16a34a;
      color: #ffffff;
      border-color: #15803d;
    }

    /* Sidebar / Aba Lateral */
    #sidebar {
      position: absolute;
      top: 0;
      left: -280px;
      width: 280px;
      height: 100%;
      background-color: #121212;
      border-right: 1px solid #27272a;
      z-index: 200;
      transition: left 0.3s ease;
      display: flex;
      flex-direction: column;
      padding: 16px;
    }

    #sidebar.open {
      left: 0;
    }

    #overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0, 0, 0, 0.6);
      z-index: 150;
      display: none;
    }

    #overlay.active {
      display: block;
    }

    .sidebar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 1px solid #27272a;
    }

    .sidebar-title {
      font-size: 16px;
      font-weight: bold;
      color: #ffffff;
    }

    #new-note-btn {
      background-color: #0066cc;
      color: #ffffff;
      border: none;
      padding: 8px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 16px;
      width: 100%;
      text-align: center;
    }

    .notes-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .note-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 12px;
      background-color: #1a1a1a;
      border: 1px solid #27272a;
      border-radius: 4px;
      cursor: pointer;
      color: #a1a1aa;
      font-size: 14px;
      transition: all 0.2s;
    }

    .note-item:hover, .note-item.active {
      background-color: #27272a;
      color: #ffffff;
      border-color: #3f3f46;
    }

    .note-item-title {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      margin-right: 8px;
    }

    .delete-note-btn {
      background: none;
      border: none;
      color: #71717a;
      cursor: pointer;
      font-size: 14px;
      padding: 2px 6px;
    }

    .delete-note-btn:hover {
      color: #ef4444;
    }

    /* Containers de Visualização */
    .editor-container {
      width: 100%;
      height: 100%;
      position: relative;
    }

    .view-pane {
      width: 100%;
      height: 100%;
      padding: 55px 20px 20px 20px;
      font-size: var(--font-size);
      line-height: var(--line-height);
      overflow-y: auto;
      touch-action: pan-y;
      border: none;
      outline: none;
      position: absolute;
      top: 0;
      left: 0;
      display: none;
    }

    .view-pane.active {
      display: block;
    }

    /* 1. Modo Leitura (Renderizado Bloqueado) */
    #read-pane {
      background-color: #000000;
      color: #e4e4e7;
      user-select: text;
    }

    /* 2. Modo Edição Visual (WYSIWYG) */
    #edit-visual-pane {
      background-color: #000000;
      color: #e4e4e7;
    }

    /* Estilização Interna do Markdown (Compartilhada) */
    .markdown-body h1, .markdown-body h2, .markdown-body h3 { 
      margin-top: 0.8em;
      margin-bottom: 0.4em; 
      color: #fff; 
    }
    .markdown-body h1 { font-size: 2em; border-bottom: 1px solid #27272a; padding-bottom: 0.3em; }
    .markdown-body h2 { font-size: 1.5em; }
    .markdown-body h3 { font-size: 1.2em; }
    .markdown-body p { margin-bottom: 1em; }
    .markdown-body code { background: #1f1f23; padding: 2px 6px; border-radius: 4px; font-family: monospace; }
    .markdown-body pre { background: #1f1f23; padding: 12px; border-radius: 6px; overflow-x: auto; margin-bottom: 1em; }
    .markdown-body pre code { background: none; padding: 0; }
    .markdown-body ul, .markdown-body ol { margin-left: 20px; margin-bottom: 1em; }
    .markdown-body blockquote { border-left: 4px solid #3f3f46; padding-left: 12px; color: #a1a1aa; margin-bottom: 1em; }

    /* Placeholders Esmaecidos */
    #edit-visual-pane:empty:before {
      content: "### Título\n\nComece a digitar...";
      color: #4a4a4a;
      white-space: pre-wrap;
    }

    #read-pane:empty:before {
      content: "Nota vazia.";
      color: #4a4a4a;
    }

    /* 3. Modo Código Markdown (Textarea Raw) */
    #raw-pane {
      background-color: #000000;
      color: #a1a1aa;
      font-family: "Fira Code", monospace, monospace;
      resize: none;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    #raw-pane::placeholder {
      color: #4a4a4a;
    }
  </style>
</head>
<body>

  <!-- Botão Sidebar -->
  <button id="menu-btn">☰</button>

  <!-- Botões de Ação Superiores -->
  <div class="top-actions">
    <button id="edit-btn" class="action-btn">Editar</button>
    <button id="markdown-btn" class="action-btn" style="display: none;">Markdown</button>
    <button id="save-btn" class="action-btn primary" style="display: none;">Salvar</button>
  </div>

  <!-- Overlay Sidebar -->
  <div id="overlay"></div>

  <!-- Sidebar Lateral -->
  <div id="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">Minhas Notas</span>
    </div>
    <button id="new-note-btn">+ Nova Nota</button>
    <div class="notes-list" id="notes-list"></div>
  </div>

  <!-- Área de Conteúdo -->
  <div class="editor-container">
    <!-- Modo 1: Leitura Bloqueada -->
    <div id="read-pane" class="view-pane markdown-body active"></div>

    <!-- Modo 2: Edição Visual -->
    <div id="edit-visual-pane" class="view-pane markdown-body" contenteditable="true" spellcheck="false"></div>

    <!-- Modo 3: Código Raw -->
    <textarea id="raw-pane" class="view-pane" spellcheck="false" placeholder="### Título&#10;&#10;Comece a digitar..."></textarea>
  </div>

  <script>
    const readPane = document.getElementById('read-pane');
    const editVisualPane = document.getElementById('edit-visual-pane');
    const rawPane = document.getElementById('raw-pane');

    const editBtn = document.getElementById('edit-btn');
    const markdownBtn = document.getElementById('markdown-btn');
    const saveBtn = document.getElementById('save-btn');

    const menuBtn = document.getElementById('menu-btn');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');
    const newNoteBtn = document.getElementById('new-note-btn');
    const notesListContainer = document.getElementById('notes-list');

    // Estado do App
    let notes = JSON.parse(localStorage.getItem('notepad_notes_list')) || [];
    let currentNoteId = localStorage.getItem('notepad_current_note_id');
    
    // 'read' | 'visual' | 'raw'
    let currentMode = 'read';
    let currentFontSize = parseFloat(localStorage.getItem('notepad_font_size')) || 18;

    // Inicialização
    if (notes.length === 0) {
      const initialNote = {
        id: Date.now().toString(),
        content: ""
      };
      notes.push(initialNote);
      currentNoteId = initialNote.id;
    } else if (!currentNoteId || !notes.find(n => n.id === currentNoteId)) {
      currentNoteId = notes[0].id;
    }

    saveNotesToStorage();
    loadCurrentNote();
    updateFontSize(currentFontSize);

    // Sidebar
    menuBtn.addEventListener('click', () => {
      sidebar.classList.toggle('open');
      overlay.classList.toggle('active');
    });

    overlay.addEventListener('click', closeSidebar);

    function closeSidebar() {
      sidebar.classList.remove('open');
      overlay.classList.remove('active');
    }

    // Carregar Nota
    function loadCurrentNote() {
      const note = notes.find(n => n.id === currentNoteId);
      if (note) {
        setMode('read');
        updateDocumentTitle(note.content);
        renderNotesList();
      }
    }

    function saveNotesToStorage() {
      localStorage.setItem('notepad_notes_list', JSON.stringify(notes));
      localStorage.setItem('notepad_current_note_id', currentNoteId);
    }

    function getNoteTitle(content) {
      if (!content || content.trim() === '') return 'Nova Nota';
      const match = content.match(/^#+\s+(.*)/m);
      if (match && match[1]) {
        return match[1].trim();
      }
      const firstLine = content.trim().split('\n')[0] || '';
      return firstLine.substring(0, 24) || 'Nova Nota';
    }

    function renderNotesList() {
      notesListContainer.innerHTML = '';
      notes.forEach(note => {
        const item = document.createElement('div');
        item.className = `note-item ${note.id === currentNoteId ? 'active' : ''}`;
        
        const titleSpan = document.createElement('span');
        titleSpan.className = 'note-item-title';
        titleSpan.textContent = getNoteTitle(note.content);

        const deleteBtn = document.createElement('button');
        deleteBtn.className = 'delete-note-btn';
        deleteBtn.innerHTML = '✕';
        deleteBtn.onclick = (e) => {
          e.stopPropagation();
          deleteNote(note.id);
        };

        item.appendChild(titleSpan);
        if (notes.length > 1) {
          item.appendChild(deleteBtn);
        }

        item.onclick = () => {
          currentNoteId = note.id;
          saveNotesToStorage();
          loadCurrentNote();
          closeSidebar();
        };

        notesListContainer.appendChild(item);
      });
    }

    newNoteBtn.addEventListener('click', () => {
      const newNote = {
        id: Date.now().toString(),
        content: ''
      };
      notes.unshift(newNote);
      currentNoteId = newNote.id;
      saveNotesToStorage();
      loadCurrentNote();
      closeSidebar();
      setMode('visual'); // Já abre no modo edição
    });

    function deleteNote(id) {
      if (notes.length <= 1) return;
      notes = notes.filter(n => n.id !== id);
      if (currentNoteId === id) {
        currentNoteId = notes[0].id;
      }
      saveNotesToStorage();
      loadCurrentNote();
    }

    function getCleanMarkdownText(element) {
      let rawText = element.innerText || '';
      let lines = rawText.replace(/\u00A0/g, ' ').replace(/\r\n/g, '\n').split('\n');
      return lines.map(line => line.trimEnd()).join('\n').trim();
    }

    // Controle de Modos e Visibilidade
    function setMode(mode) {
      currentMode = mode;
      const note = notes.find(n => n.id === currentNoteId);
      const content = note ? note.content : '';

      // Oculta todos
      readPane.classList.remove('active');
      editVisualPane.classList.remove('active');
      rawPane.classList.remove('active');

      if (mode === 'read') {
        readPane.innerHTML = content ? marked.parse(content) : '';
        readPane.classList.add('active');

        editBtn.style.display = 'block';
        markdownBtn.style.display = 'none';
        saveBtn.style.display = 'none';
        markdownBtn.classList.remove('active');

      } else if (mode === 'visual') {
        editVisualPane.innerHTML = content ? marked.parse(content) : '';
        editVisualPane.classList.add('active');

        editBtn.style.display = 'none';
        markdownBtn.style.display = 'block';
        saveBtn.style.display = 'block';
        markdownBtn.classList.remove('active');
        editVisualPane.focus();

      } else if (mode === 'raw') {
        rawPane.value = content;
        rawPane.classList.add('active');

        editBtn.style.display = 'none';
        markdownBtn.style.display = 'block';
        saveBtn.style.display = 'block';
        markdownBtn.classList.add('active');
        rawPane.focus();
      }
    }

    // Eventos dos Botões
    editBtn.addEventListener('click', () => {
      setMode('visual');
    });

    markdownBtn.addEventListener('click', () => {
      if (currentMode === 'visual') {
        // Salva estado do visual antes de trocar para raw
        const note = notes.find(n => n.id === currentNoteId);
        if (note) note.content = getCleanMarkdownText(editVisualPane);
        setMode('raw');
      } else {
        // Salva estado do raw antes de trocar para visual
        const note = notes.find(n => n.id === currentNoteId);
        if (note) note.content = rawPane.value;
        setMode('visual');
      }
    });

    saveBtn.addEventListener('click', () => {
      const note = notes.find(n => n.id === currentNoteId);
      if (note) {
        if (currentMode === 'visual') {
          note.content = getCleanMarkdownText(editVisualPane);
        } else if (currentMode === 'raw') {
          note.content = rawPane.value;
        }
        saveNotesToStorage();
        updateDocumentTitle(note.content);
        renderNotesList();
      }
      setMode('read');
    });

    // Auto-save durante a digitação
    editVisualPane.addEventListener('input', () => {
      const note = notes.find(n => n.id === currentNoteId);
      if (note) {
        note.content = getCleanMarkdownText(editVisualPane);
        saveNotesToStorage();
        updateDocumentTitle(note.content);
        renderNotesList();
      }
    });

    rawPane.addEventListener('input', () => {
      const note = notes.find(n => n.id === currentNoteId);
      if (note) {
        note.content = rawPane.value;
        saveNotesToStorage();
        updateDocumentTitle(note.content);
        renderNotesList();
      }
    });

    function updateDocumentTitle(content) {
      document.title = getNoteTitle(content);
    }

    // Zoom (Pinch-to-Zoom e Ctrl+Scroll)
    function updateFontSize(size) {
      currentFontSize = Math.min(Math.max(size, 10), 60);
      document.documentElement.style.setProperty('--font-size', `${currentFontSize}px`);
      localStorage.setItem('notepad_font_size', currentFontSize);
    }

    let initialDistance = null;
    let initialFontSize = 18;

    document.addEventListener('touchstart', (e) => {
      if (e.touches.length === 2) {
        initialDistance = getDistance(e.touches);
        initialFontSize = currentFontSize;
      }
    }, { passive: true });

    document.addEventListener('touchmove', (e) => {
      if (e.touches.length === 2 && initialDistance !== null) {
        const newDistance = getDistance(e.touches);
        const scale = newDistance / initialDistance;
        updateFontSize(initialFontSize * scale);
      }
    }, { passive: true });

    document.addEventListener('touchend', (e) => {
      if (e.touches.length < 2) initialDistance = null;
    }, { passive: true });

    function getDistance(touches) {
      const dx = touches[0].clientX - touches[1].clientX;
      const dy = touches[0].clientY - touches[1].clientY;
      return Math.hypot(dx, dy);
    }

    document.addEventListener('wheel', (e) => {
      if (e.ctrlKey) {
        e.preventDefault();
        const delta = e.deltaY < 0 ? 1.1 : 0.9;
        updateFontSize(currentFontSize * delta);
      }
    }, { passive: false });
  </script>
</body>
</html>
